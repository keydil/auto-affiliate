<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Konten Affiliate Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #c8f135;
    --accent-dark: #9bbf1a;
    --result-body-color: #ccc;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }

  :root.light {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #f0efea;
    --border: #e0ddd6;
    --border2: #d0cdc6;
    --text: #1a1a1a;
    --text2: #666;
    --text3: #aaa;
    --accent: #5a8a00;
    --accent-dark: #3d6200;
    --result-body-color: #333;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 32px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .header-left { flex: 1; }

  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    border: 1px solid var(--border2);
    border-radius: 100px;
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    margin-top: 4px;
  }

  .theme-toggle:hover {
    border-color: var(--text2);
    color: var(--text);
  }

  .theme-icon { font-size: 14px; }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(200,241,53,.1);
    border: 1px solid rgba(200,241,53,.2);
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  h1 span { color: var(--accent); }

  .sub {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .sec-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
  }

  /* STYLE CHIPS */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .chip {
    padding: 7px 16px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    border: 1px solid var(--border2);
    border-radius: 100px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
    user-select: none;
  }

  .chip:hover {
    border-color: var(--text2);
    color: var(--text);
  }

  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0f0f;
  }

  /* GRID */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .field input[type=text] {
    width: 100%;
    padding: 10px 14px;
    font-size: 14px;
    font-family: var(--font);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }

  .field input[type=text]:focus {
    border-color: var(--accent);
  }

  .field input[type=text]::placeholder {
    color: var(--text3);
  }

  /* UPLOAD */
  .upload-zone {
    border: 1px dashed var(--border2);
    border-radius: var(--radius-sm);
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: border-color .2s, background .2s;
    background: var(--surface2);
    overflow: hidden;
  }

  .upload-zone:hover {
    border-color: var(--accent);
    background: rgba(200,241,53,.04);
  }

  .upload-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    font-size: 20px;
    margin-bottom: 4px;
  }

  .upload-hint {
    font-size: 12px;
    color: var(--text3);
  }

  .upload-name {
    font-size: 11px;
    color: var(--accent);
    margin-top: 6px;
    font-family: var(--mono);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .upload-preview {
    width: 100%;
    max-height: 72px;
    object-fit: contain;
    border-radius: 6px;
    margin-top: 8px;
    display: none;
  }

  /* GEN BUTTON */
  .gen-btn {
    width: 100%;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font);
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    margin-top: 4px;
    transition: background .2s, transform .1s;
    letter-spacing: .01em;
  }

  .gen-btn:hover { background: var(--accent-dark); }
  .gen-btn:active { transform: scale(.99); }

  /* RESULTS */
  #results { display: none; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 12px;
  }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .result-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .copy-btn {
    padding: 5px 14px;
    font-size: 12px;
    font-family: var(--font);
    border: 1px solid var(--border2);
    border-radius: 100px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
  }

  .copy-btn:hover {
    border-color: var(--text2);
    color: var(--text);
  }

  .copy-btn.copied {
    border-color: var(--accent);
    color: var(--accent);
  }

  .result-body {
    padding: 14px 16px;
    font-size: 13px;
    font-family: var(--mono);
    line-height: 1.75;
    color: var(--result-body-color);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .copy-all {
    width: 100%;
    padding: 11px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
    margin-top: 4px;
  }

  .copy-all:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  @media (max-width: 480px) {
    .grid2 { grid-template-columns: 1fr; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <div class="badge">Affiliate Tools</div>
      <h1>Auto Konten <span>Generator</span></h1>
      <p class="sub">Isi form → pilih gaya → generate → copy → tempel ke AI video (Veo / Kling / Haiper)</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
      <span class="theme-icon">☀️</span> Light
    </button>
  </header>

  <div class="card">
    <div class="sec-label">Gaya Konten</div>
    <div class="chips" id="chips">
      <button class="chip active" data-style="cinematic">Cinematic</button>
      <button class="chip" data-style="review">Review Jujur</button>
      <button class="chip" data-style="softsell">Soft Selling</button>
      <button class="chip" data-style="problem">Problem–Solution</button>
      <button class="chip" data-style="testimoni">Testimoni</button>
    </div>

    <div class="grid2">
      <div class="field"><label>Nama Produk</label><input type="text" id="produk" placeholder="cth: Serum Vitamin C"></div>
      <div class="field"><label>Harga</label><input type="text" id="harga" placeholder="cth: Rp89.000"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Keunggulan 1</label><input type="text" id="k1" placeholder="cth: mencerahkan kulit"></div>
      <div class="field"><label>Keunggulan 2</label><input type="text" id="k2" placeholder="cth: bebas paraben"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Target Market</label><input type="text" id="target" placeholder="cth: perempuan 20–35 tahun"></div>
      <div class="field"><label>Masalah yang Diselesaikan</label><input type="text" id="masalah" placeholder="cth: kulit kusam"></div>
    </div>

    <hr class="divider">

    <div class="sec-label">Referensi Gambar (Opsional)</div>
    <div class="grid2">
      <div class="field">
        <label>Gambar Produk</label>
        <div class="upload-zone">
          <input type="file" accept="image/*" onchange="handleUpload('product', this)">
          <div class="upload-icon">📦</div>
          <div class="upload-hint">Klik untuk upload</div>
          <div class="upload-name" id="productName"></div>
          <img id="productPreview" class="upload-preview">
        </div>
      </div>
      <div class="field">
        <label>Foto Bintang Iklan</label>
        <div class="upload-zone">
          <input type="file" accept="image/*" onchange="handleUpload('actor', this)">
          <div class="upload-icon">🧑</div>
          <div class="upload-hint">Klik untuk upload</div>
          <div class="upload-name" id="actorName"></div>
          <img id="actorPreview" class="upload-preview">
        </div>
      </div>
    </div>

    <button class="gen-btn" onclick="generate()">⚡ Generate Prompt</button>
  </div>

  <div id="results">
    <div class="result-card">
      <div class="result-header">
        <span class="result-tag">Hook</span>
        <button class="copy-btn" onclick="copyOne('hookText', this)">Copy</button>
      </div>
      <div class="result-body" id="hookText"></div>
    </div>
    <div class="result-card">
      <div class="result-header">
        <span class="result-tag">Tengah</span>
        <button class="copy-btn" onclick="copyOne('tengahText', this)">Copy</button>
      </div>
      <div class="result-body" id="tengahText"></div>
    </div>
    <div class="result-card">
      <div class="result-header">
        <span class="result-tag">Closing</span>
        <button class="copy-btn" onclick="copyOne('closingText', this)">Copy</button>
      </div>
      <div class="result-body" id="closingText"></div>
    </div>
    <button class="copy-all" onclick="copyAll()">Copy Semua Prompt</button>
  </div>

</div>

<script>
let activeStyle = 'cinematic';
let productFileName = '';
let actorFileName = '';
let isLight = false;

function toggleTheme() {
  isLight = !isLight;
  document.documentElement.classList.toggle('light', isLight);
  const btn = document.getElementById('themeBtn');
  btn.innerHTML = isLight
    ? '<span class="theme-icon">🌙</span> Dark'
    : '<span class="theme-icon">☀️</span> Light';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

// Load saved theme
if (localStorage.getItem('theme') === 'light') toggleTheme();

document.getElementById('chips').addEventListener('click', e => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  activeStyle = btn.dataset.style;
});

function handleUpload(type, input) {
  if (!input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();
  if (type === 'product') {
    productFileName = file.name;
    document.getElementById('productName').textContent = file.name;
    reader.onload = e => {
      const img = document.getElementById('productPreview');
      img.src = e.target.result;
      img.style.display = 'block';
    };
  } else {
    actorFileName = file.name;
    document.getElementById('actorName').textContent = file.name;
    reader.onload = e => {
      const img = document.getElementById('actorPreview');
      img.src = e.target.result;
      img.style.display = 'block';
    };
  }
  reader.readAsDataURL(file);
}

function val(id) {
  return document.getElementById(id).value.trim() || '[' + id + ']';
}

function imgRef() {
  const lines = [];
  if (productFileName) lines.push(`Product image reference: "${productFileName}" — do not change product design, keep identical to reference.`);
  if (actorFileName) lines.push(`Actor image reference: "${actorFileName}" — use this person as the actor in the video.`);
  return lines.length ? lines.join('\n') + '\n' : '';
}

const templates = {
  cinematic: (p, k1, k2, t, h, m, ref) => ({
    hook: `${ref}Cinematic realistic video, vertical 9:16, the actor holding ${p},\nsoft lighting, clean background, surprised expression,\nshe speaks Indonesian:\n"${m}? Akhirnya ada solusinya!"`,
    tengah: `${ref}Realistic video, the actor using ${p},\nshowing ${k1} and ${k2}, smooth camera movement,\nshe speaks Indonesian:\n"${k1}, jadi cocok buat ${t}."`,
    closing: `${ref}Realistic video, the actor smiling while holding ${p},\nslow zoom, natural lighting,\nshe speaks Indonesian:\n"Harganya juga cuma ${h}, yang mau samaan klik keranjangnya ya!"`
  }),
  review: (p, k1, k2, t, h, m, ref) => ({
    hook: `${ref}Vertical 9:16 realistic video, gaya review kasual, the actor berkata:\n"Oke, aku udah coba ${p} selama 2 minggu. Ini jujur banget ya..."`,
    tengah: `${ref}The actor menunjukkan produk ${p} ke kamera, close-up, berkata:\n"Yang bikin aku suka: ${k1} sama ${k2}. Buat ${t} ini worth banget."`,
    closing: `${ref}The actor menatap kamera, nada serius:\n"Harganya ${h} doang. Kalau kamu punya masalah ${m}, ini solusinya. Link di bio!"`
  }),
  softsell: (p, k1, k2, t, h, m, ref) => ({
    hook: `${ref}Aesthetic vertical video, suasana pagi hari, the actor sedang merawat diri, voice over:\n"Rutinitas yang bikin aku makin percaya diri setiap pagi..."`,
    tengah: `${ref}B-roll produk ${p}, the actor menggunakannya, voice over:\n"${k1} dan ${k2} — dua alasan kenapa ${t} suka banget ini."`,
    closing: `${ref}Close-up produk ${p}, tulisan harga ${h} muncul di layar, voice over:\n"Kalau kamu juga punya masalah ${m}, coba deh. Link di bawah."`
  }),
  problem: (p, k1, k2, t, h, m, ref) => ({
    hook: `${ref}Vertical 9:16 video, the actor tampak frustasi, pencahayaan dramatis ringan, berkata:\n"Aku udah coba banyak produk buat ${m}... dan hampir menyerah."`,
    tengah: `${ref}Transisi ke tampilan cerah, the actor tersenyum memegang ${p}:\n"Tapi sejak pakai ini — ${k1}, bahkan ${k2}. Cocok banget buat ${t}."`,
    closing: `${ref}The actor sumringah, close-up produk ${p}:\n"Harganya cuma ${h}. Nggak nyesel deh. Klik keranjang sebelum habis!"`
  }),
  testimoni: (p, k1, k2, t, h, m, ref) => ({
    hook: `${ref}Vertical video gaya UGC, the actor merekam diri sendiri seperti story TikTok:\n"Guys, aku harus cerita soal ${p} ini. Beneran game changer buat aku."`,
    tengah: `${ref}The actor memperlihatkan produk ${p} ke kamera, ekspresi antusias:\n"Masalah ${m} aku berkurang banget. ${k1} dan ${k2} — buat ${t} pas banget."`,
    closing: `${ref}The actor menutup video, nada hangat:\n"Harganya ${h} doang. Udah aku repurchase 2 kali. Kalian harus coba!"`
  })
};

function generate() {
  const p = val('produk'), k1 = val('k1'), k2 = val('k2');
  const t = val('target'), h = val('harga'), m = val('masalah');
  const ref = imgRef();
  const tpl = templates[activeStyle](p, k1, k2, t, h, m, ref);
  document.getElementById('hookText').textContent = tpl.hook;
  document.getElementById('tengahText').textContent = tpl.tengah;
  document.getElementById('closingText').textContent = tpl.closing;
  const r = document.getElementById('results');
  r.style.display = 'block';
  r.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyOne(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll() {
  const text = [
    '=== HOOK ===\n' + document.getElementById('hookText').textContent,
    '\n=== TENGAH ===\n' + document.getElementById('tengahText').textContent,
    '\n=== CLOSING ===\n' + document.getElementById('closingText').textContent
  ].join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-all');
    btn.textContent = '✓ Semua prompt berhasil dicopy!';
    setTimeout(() => { btn.textContent = 'Copy Semua Prompt'; }, 2500);
  });
}
</script>
</body>
</html>
